<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calander</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/main.js" defer></script>
    <script>
        const saved = localStorage.getItem("theme");
        if (saved === "1") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
    <script src="scripts/calendar.js" defer></script>
</head>
<body class="calendar-page">
    <header class="site-header">
        <!-- <img src="" alt=""> -->
        <h1>Journal App</h1>
        <nav>
            <ul>
                <li><a href="journal.html">Home</a></li>
                <li><a href="calendar.html">Calendar</a></li>
                <li><a href="goals.html">Goals</a></li>
                <!-- <li><a href=""></a></li> -->
            </ul>
            <input type="range" class="toggle-range" id="darktoggle" min="0" max="1" step="1" value="0">
            <button class="login-button"><a href="index.html">Login</a></button>
        </nav>
    </header>
    <main>
        <input type="month" class="calendar-dropdown">
        <button id="return">Reset</button>


        <section class="calendarTitle">
            <button id="prevMonth">‹</button>
            <p id="yearDisplay"></p>
            <button id="nextMonth">›</button>
        </section>
        <section id="calendar">
            <div class="weekday">Sunday</div>
            <div class="weekday">Monday</div>
            <div class="weekday">Tuesday</div>
            <div class="weekday">Wednesday</div>
            <div class="weekday">Thursday</div>
            <div class="weekday">Friday</div>
            <div class="weekday">Saturday</div>
        </section>
    </main>
        <footer class="site-footer">
            <p>&copy; 2026 journal app</p>
            <a href="about-us.html">About Us</a>
        </footer>
</body>
</html>
