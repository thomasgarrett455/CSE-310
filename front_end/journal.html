<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Entries</title>
    <link rel="stylesheet" href="styles/main.css">
    <script type="module" src="scripts/main.js" defer></script>
    <script type="module" src="scripts/auth.js" defer></script>
    <script type="module" src="scripts/darkmode.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- <script type="module" src="scripts/goals.js"></script> -->
    <script>
        const saved = localStorage.getItem("theme");
        if (saved === "1") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
</head>
<body class="home-page">
    <header class="site-header">
        <!-- <img src="" alt=""> -->
        <h1>The Daily Entry</h1>
        <!-- <h1>Daily Entry</h1> -->

        <nav>
            <ul>
                <li><a href="journal.html">Home</a></li>
                <li><a href="calendar.html">Calendar</a></li>
                <li><a href="goals.html">Goals</a></li>
                <!-- <li><a href=""></a></li> -->
            </ul>
            <input type="range" class="toggle-range" id="darktoggle" min="0" max="1" step="1" value="0">
            <button class="login-button"><a href="index.html">Logout</a></button>
        </nav>
    </header>
    <main>
        <section id="journal-form">
            <section id="aiPrompt">
                <h2>Journal Prompt: </h2>
                <button id="refresh-btn">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
                <p id="prompt-text"></p>
            </section>

            <section id="currGoals">
                <h2>Current Goals: </h2>
                <ul class="goal_list">
                    <li><p>goal</p></li>
                </ul>
            </section>
            
            <section id="journalEntries">
                <h2>Jounral Entry: </h2>
                <textarea id="journal_entry" placeholder="Journal Entry"></textarea>
                <button id="submit-journal">Save Journal Entry</button>
            </section>

            <section id="addGoal">
                <h2>Add Goal: </h2>
                <input type="goalName" class="goalName" placeholder="Goal Name">
                <textarea type="text" id="goal-creation" placeholder="Goal Description"></textarea>
                <button id="submit-goal">Save Goal</button>
            </section>
        </section>
    </main>
    <footer class="site-footer">
        <p>&copy; 2026 journal app</p>
        <a href="about-us.html">About Us</a>
    </footer>
</body>
</html>
