<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Entries</title>
    <link rel="stylesheet" href="styles/main.css">
    <script type="module" src="scripts/main.js" defer></script>
    <!-- <script type="module" src="scripts/goals.js"></script> -->
    <script>
        const saved = localStorage.getItem("theme");
        if (saved === "1") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>

</head>
<body class="home-page">
    <header class="site-header">
        <!-- <img src="" alt=""> -->
        <h1>Journal App</h1>
        <nav>
            <ul>
                <li><a href="journal.html">Home</a></li>
                <li><a href="calendar.html">Calendar</a></li>
                <li><a href="goals.html">Goals</a></li>
                <!-- <li><a href=""></a></li> -->
            </ul>
            <input type="range" class="toggle-range" id="darktoggle" min="0" max="1" step="1" value="0">
            <button class="login-button"><a href="index.html">Login</a></button>
        </nav>
    </header>
    <main>
        <section id="aiPrompt">
            <h2>Journal Prompt: </h2>
            <p></p>
        </section>

        <section id="currGoals">
            <h2>Current Goals: </h2>
            <ul class="goal_list">
                <li><p>goal</p></li>
            </ul>
        </section>
        
        <section id="journalEntries">
            <h2>Jounral Entry: </h2>
            <textarea id="journal_entry"></textarea>
            <button id="submit">Save Journal Entry</button>
        </section>

        <section id="addGoal">
            <h2>Add Goal: </h2>
            <textarea type="text" id="goal-creation"></textarea>
            <button id="submit">Save Goal</button>
        </section>

    </main>
    <footer class="site-footer">
        <p>&copy; 2026 journal app</p>
        <a href="about-us.html">About Us</a>
    </footer>
</body>
</html>
