<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goals</title>
    <link rel="stylesheet" href="styles/main.css" />
    <script src="scripts/main.js" defer></script>
    <script src="scripts/goals.js"></script>
    <script>
      const saved = localStorage.getItem("theme");
      if (saved === "1") {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body class="goal-page">
    <header class="site-header">
        <!-- <img src="" alt=""> -->
        <h1>Journal App</h1>
        <nav>
            <ul>
                <li><a href="journal.html">Home</a></li>
                <li><a href="calendar.html">Calendar</a></li>
                <li><a href="goals.html">Goals</a></li>
                <!-- <li><a href=""></a></li> -->
            </ul>
            <input type="range" class="toggle-range" id="darktoggle" min="0" max="1" step="1" value="0">
            <button class="login-button"><a href="index.html">Login</a></button>
        </nav>
    </header>
    <main>
      <h2>Goals</h2>
      <div class="goalsContainer">
          <section class="goalsTemplate" style="display: none">
            <h3 class="goalName"></h3>
            <p class="dateCreated"></p>
            <p class="goalDescription"></p>
            <input type="checkbox" class="checked">
            <p class="dateComplete"></p>
          </section>
      </div>
      <section id="addGoal"></section>
    </main>
    <footer class="site-footer">
      <p>&copy; 2026 journal app</p>
      <a href="about-us.html">About Us</a>
    </footer>
  </body>
</html>
