<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/login.js" defer></script>
    <script type="module" src="scripts/darkmode.js" defer></script>
</head>
<body class="login-page">
    <header class="site-header">
        <!-- <img src="" alt=""> -->
        <h1>The Daily Entry</h1>
        <nav>
            <input type="range" class="toggle-range" id="darktoggle" min="0" max="1" step="1" value="0">
        </nav>
    </header>
    <main>
        <form id="login-form">
                    
                    <span class="label-left">Login</span>
                    <input 
                    type="range" 
                    class="create-login" 
                    id="create-login" 
                    min="0" 
                    max="1" 
                    step="1" 
                    value="0"
                    
                    >
                    <span class="label-right">Create Account</span>



            <label for="username" class="username-label">Username</label>
                <input type="text" class="username" id="username" required>
            <label for="password" class="password-label">Password</label>
                <input type="password" class="password" id="password" required>
            <p class="error"></p>
            <button class="submitLogin">Submit</button>
        </form>
    </main>
    
</body>
</html>
